name: Foodie ECS Pipeline (OIDC)

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tags
        id: version
        run: |
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

          VERSION="v${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Version tags: $VERSION, $COMMIT_SHA"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2

      - name: Install Dependencies
        run: npm install
        working-directory: app

      - name: Run Snyk
        uses: snyk/actions/node@master
        with:
          command: test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: app

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t foodie-app:latest .

      - name: Tag Docker Image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}

          docker tag foodie-app:latest $IMAGE_URI:${{ steps.version.outputs.version }}
          docker tag foodie-app:latest $IMAGE_URI:${{ steps.version.outputs.commit_sha }}

      - name: Push Docker Images
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}

          docker push $IMAGE_URI:${{ steps.version.outputs.version }}
          docker push $IMAGE_URI:${{ steps.version.outputs.commit_sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS Task Definition
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition foodie-task \
            --query 'taskDefinition' \
            --output json)

          NEW_IMAGE="${{ needs.build.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build.outputs.version }}"

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )')

          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF"

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --service ${{ env.ECS_SERVICE_NAME }} \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --services ${{ env.ECS_SERVICE_NAME }}

      - name: Smoke Test (with retry)
        run: |
          for i in {1..5}; do
            bash tests/smoke_test.sh ${{ vars.PIPELINE_SMOKE_TEST_URL }} && exit 0
            sleep 10
          done
          exit 1