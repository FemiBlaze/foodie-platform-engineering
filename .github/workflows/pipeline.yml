name: Foodie ECS Pipeline (OIDC)

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE_NAME: ${{ secrets.ECS_SERVICE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tags
        id: version
        run: |
          # Get commit SHA (shortened to 7 chars)
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          
          # Human readable version from run number (v1, v2, v3...)
          VERSION="v${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          echo "Version tags: $VERSION, $COMMIT_SHA"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2

      # Install dependencies for Snyk
      - name: Install Dependencies
        run: npm install
        working-directory: app

      # Run Snyk scan in correct directory
      - name: Run Snyk
        uses: snyk/actions/node@master
        with:
          command: test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: app

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t foodie-app:latest .

      - name: Tag Docker Image with version and commit SHA
        run: |
          # Tag with human readable version (v1, v2, v3...)
          docker tag foodie-app:latest ${{ steps.login-ecr.outputs.registry }}/${{ steps.version.outputs.version }}
          
          # Tag with commit SHA for traceability
          docker tag foodie-app:latest ${{ steps.login-ecr.outputs.registry }}/${{ steps.version.outputs.commit_sha }}

      - name: Push Docker Image to ECR
        run: |
          # Push human readable version tag
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ steps.version.outputs.version }}
          
          # Push commit SHA tag
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ steps.version.outputs.commit_sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update ECS Task Definition
        run: |
          # Get the current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition foodie-task --query 'taskDefinition' --output json)
          
          # Update the image tag in container definition
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "${{ needs.build.outputs.ecr_registry }}/${{ needs.build.outputs.version }}:${{ needs.build.outputs.commit_sha }}" \
            '.containerDefinitions[0].image = $IMAGE | .revision = .revision + 1')
          
          # Register new task definition
          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text

      - name: Deploy to Amazon ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --service ${{ env.ECS_SERVICE_NAME }} \
            --force-new-deployment

      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --services ${{ env.ECS_SERVICE_NAME }}

      - name: Smoke Test
        run: bash tests/smoke_test.sh ${{ vars.PIPELINE_SMOKE_TEST_URL }}